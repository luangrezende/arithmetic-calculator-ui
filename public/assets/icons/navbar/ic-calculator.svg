<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Corpo da calculadora -->
  <rect x="2" y="2" width="20" height="20" rx="2" fill="#D1D1D1" />
  
  <!-- Tela da calculadora -->
  <rect x="4" y="4" width="16" height="5" rx="1" fill="#FFFFFF" />

  <!-- Botões -->
  <!-- Linha superior -->
  <rect x="4" y="10" width="5" height="5" rx="1" fill="#FFFFFF" />
  <text x="6.5" y="13.5" fill="#000000" font-size="3.5" font-weight="bold" text-anchor="middle">+</text>

  <rect x="10" y="10" width="5" height="5" rx="1" fill="#FFFFFF" />
  <text x="12.5" y="13.5" fill="#000000" font-size="3.5" font-weight="bold" text-anchor="middle">-</text>

  <!-- Linha inferior -->
  <rect x="4" y="16" width="5" height="5" rx="1" fill="#FFFFFF" />
  <text x="6.5" y="19.5" fill="#000000" font-size="3.5" font-weight="bold" text-anchor="middle">×</text>

  <rect x="10" y="16" width="10" height="5" rx="1" fill="#FF6F41" />
  <text x="15" y="19.5" fill="#FFFFFF" font-size="3.5" font-weight="bold" text-anchor="middle">=</text>
</svg>
